name: 料金データ自動更新

on:
  # 毎日午前6時（JST = UTC 21:00）に自動実行
  schedule:
    - cron: '0 21 * * *'

  # 手動実行ボタン（GitHubの Actions タブから実行可能）
  workflow_dispatch:
    inputs:
      reason:
        description: '実行理由（任意）'
        required: false
        default: '手動更新'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: マスタースプレッドシートから料金データを取得
        run: python3 scripts/fetch_from_master.py

      - name: 変更をコミット
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"

          # データが更新されている場合のみコミット
          if git diff --quiet web/data/; then
            echo "データに変更なし。コミットをスキップします。"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add web/data/
            git commit -m "🔄 料金データ自動更新 $(date '+%Y/%m/%d %H:%M JST' -d '+9 hours')"
            git push
            echo "✅ データを更新しました"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        id: commit

  # データ更新時にPagesも再デプロイ
  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    uses: ./.github/workflows/deploy-pages.yml
