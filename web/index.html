<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ボーテスキンクリニック 料金表</title>
  <style>
    :root {
      --primary: #b07d62;
      --primary-light: #d4a98a;
      --primary-dark: #8a5c3f;
      --accent: #e8d5c4;
      --bg: #faf7f4;
      --card-bg: #fff;
      --text: #3a2e27;
      --text-light: #7a6a5f;
      --border: #e0d0c4;
      --highlight: #fff3ec;
      --old-price: #aaa;
      --first-visit: #2563eb;
      --campaign: #dc2626;
      --bundle: #047857;
      --repeat: #7c3aed;
      --monitor: #0891b2;
      --pp-bg: #fef9ef;
      --pp-border: #e8c97a;
      --pp-text: #92400e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ===== ヘッダー ===== */
    .site-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      color: #fff;
      padding: 16px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .site-header h1 { font-size: 18px; font-weight: bold; letter-spacing: 0.05em; }
    .site-header .subtitle { font-size: 11px; opacity: 0.85; margin-top: 2px; }
    .update-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }

    /* ===== 検索・フィルター ===== */
    .controls {
      background: #fff;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 60px;
      z-index: 99;
    }
    .search-box {
      width: 100%;
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      outline: none;
      background: var(--bg);
      color: var(--text);
    }
    .search-box:focus { border-color: var(--primary); }

    /* ===== カテゴリタブ ===== */
    .category-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 6px 14px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 4px 10px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 11px;
      cursor: pointer;
      background: #fff;
      color: var(--text-light);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ===== メインコンテンツ ===== */
    .main {
      padding: 10px;
      overflow: auto;
      height: calc(100vh - 140px);
      -webkit-overflow-scrolling: touch;
    }

    /* ===== カテゴリブロック ===== */
    .cat-section { margin-bottom: 16px; }
    .cat-header {
      background: var(--primary);
      color: #fff;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 8px 8px 0 0;
      letter-spacing: 0.03em;
      position: sticky;
      top: 0;
      z-index: 3;
    }

    /* ===== テーブル ===== */
    .table-wrap {
      border-radius: 0 0 8px 8px;
      box-shadow: 0 2px 8px rgba(176,125,98,0.1);
    }

    .price-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-size: 12px;
    }

    .price-table thead th {
      background: var(--primary-dark);
      color: #fff;
      padding: 6px 8px;
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,0.15);
      position: sticky;
      top: 34px;
      z-index: 2;
    }
    .price-table thead th:first-child {
      text-align: left;
      padding-left: 10px;
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 120px;
      max-width: 180px;
    }
    .price-table thead th:last-child { border-right: none; }

    /* PP列ヘッダー */
    .price-table thead th.th-pp {
      background: #78350f;
    }

    .price-table tbody td {
      padding: 5px 8px;
      border-bottom: 1px solid #f0e8e0;
      border-right: 1px solid #f5efe8;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }
    .price-table tbody td:first-child {
      text-align: left;
      padding-left: 10px;
      position: sticky;
      left: 0;
      background: inherit;
      z-index: 1;
      white-space: normal;
      min-width: 120px;
      max-width: 180px;
      word-break: break-all;
    }
    .price-table tbody td:last-child { border-right: none; }

    .price-table tbody tr:nth-child(even) { background: #faf7f4; }
    .price-table tbody tr:nth-child(even) td:first-child { background: #faf7f4; }
    .price-table tbody tr:nth-child(odd) td:first-child { background: #fff; }
    .price-table tbody tr:hover { background: #fdf2e9 !important; }
    .price-table tbody tr:hover td:first-child { background: #fdf2e9 !important; }

    /* 施術名セル */
    .treat-name { font-weight: 600; font-size: 12px; color: var(--primary-dark); }
    .treat-area { font-size: 11px; color: var(--text-light); }
    .treat-sessions {
      display: inline-block;
      background: var(--accent);
      color: var(--primary-dark);
      border-radius: 8px;
      padding: 0 5px;
      font-size: 10px;
      margin-left: 4px;
    }

    /* グループ区切り */
    .group-first td { border-top: 2px solid var(--border); }

    /* 価格セル */
    .p-val { font-weight: 700; color: var(--text); }
    .p-old {
      color: var(--old-price);
      font-size: 11px;
    }
    .p-first { color: var(--first-visit); font-weight: 600; }
    .p-repeat { color: var(--repeat); font-weight: 600; }
    .p-campaign { color: var(--campaign); font-weight: 700; }
    .p-monitor { color: var(--monitor); font-weight: 600; }
    .p-na { color: #ccc; font-size: 11px; }

    /* PP列 */
    .td-pp {
      background: var(--pp-bg) !important;
    }
    .p-pp { color: var(--pp-text); font-weight: 600; font-size: 11px; }
    .price-table tbody tr:nth-child(even) .td-pp { background: #fdf6e8 !important; }
    .price-table tbody tr:hover .td-pp { background: #fef0d4 !important; }

    /* 回数列 */
    .price-table thead th.col-sessions,
    .price-table tbody td.col-sessions {
      text-align: center;
      white-space: nowrap;
      font-size: 11px;
    }

    /* ===== プリペイド説明 ===== */
    .prepaid-info {
      background: var(--pp-bg);
      border: 1px solid var(--pp-border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      font-size: 11px;
      color: var(--pp-text);
      line-height: 1.6;
    }
    .prepaid-info strong { font-weight: 700; }

    /* ===== 検索なし ===== */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    /* ===== フッター ===== */
    .site-footer {
      background: var(--primary-dark);
      color: rgba(255,255,255,0.85);
      padding: 14px;
      text-align: center;
      font-size: 11px;
    }
    .footer-note { color: rgba(255,255,255,0.6); margin-top: 4px; font-size: 10px; }

    /* ===== スマホ非対応メッセージ ===== */
    .mobile-block {
      display: none;
      text-align: center;
      padding: 60px 24px;
      color: var(--text-light);
      line-height: 1.8;
    }
    .mobile-block-icon { font-size: 36px; margin-bottom: 12px; }
    .mobile-block-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .mobile-block-msg { font-size: 13px; }

    @media (max-width: 767px) {
      .mobile-block { display: block; }
      .controls, .category-tabs, .main, .print-btn { display: none !important; }
    }

    /* ===== 印刷ボタン ===== */
    .print-btn {
      position: fixed;
      bottom: 16px;
      right: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(176,125,98,0.4);
      z-index: 200;
      font-family: inherit;
    }

    /* ===== 印刷 ===== */
    @media print {
      .site-header { position: static; box-shadow: none; }
      .controls, .category-tabs, .print-btn { display: none !important; }
      .main { padding: 0; }
      body { font-size: 10px; }
      .cat-section { break-inside: avoid; }
      .price-table { min-width: auto; font-size: 9px; }
      .price-table thead th { font-size: 8px; padding: 4px; }
      .price-table tbody td { padding: 3px 4px; }
      .price-table thead th:first-child,
      .price-table tbody td:first-child { position: static; }
      .table-wrap { overflow: visible; }
    }

    /* ===== デスクトップ ===== */
    @media (min-width: 900px) {
      .site-header h1 { font-size: 22px; }
      .main { max-width: 1200px; margin: 0 auto; padding: 14px 20px; }
      .controls, .category-tabs { max-width: 1200px; margin: 0 auto; }
      .price-table { font-size: 13px; }
      .price-table thead th { font-size: 11px; padding: 8px; }
      .price-table tbody td { padding: 6px 10px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1>ボーテスキンクリニック</h1>
  <div class="subtitle">料金表 ※税込</div>
  <div class="update-time" id="updateTime"></div>
</header>

<div class="mobile-block">
  <div class="mobile-block-icon">💻</div>
  <div class="mobile-block-title">タブレット・PCでご覧ください</div>
  <div class="mobile-block-msg">料金表は画面サイズの関係上、<br>タブレットまたはPC（横幅768px以上）での<br>閲覧を推奨しております。</div>
</div>

<div class="controls">
  <input type="search" class="search-box" id="searchBox" placeholder="施術名・部位で検索..." autocomplete="off">
</div>

<div class="category-tabs" id="categoryTabs">
  <button class="tab-btn active" data-cat="all">すべて</button>
</div>

<main class="main" id="mainContent">
  <div class="no-results" id="loadingMsg">読み込み中...</div>
</main>

<button class="print-btn" onclick="window.print()">🖨️ 印刷</button>

<footer class="site-footer">
  <div>ボーテスキンクリニック</div>
  <div class="footer-note">※表示価格はすべて税込です。価格は予告なく変更する場合がございます。</div>
</footer>

<script>
const DATA_URL = './data/prices_public.json';

let allData = null;
let currentCategory = 'all';
let searchQuery = '';

const CATEGORY_ORDER = [
  'シミ取り（そばかす・肝斑・ほくろ）',
  'しわ・たるみ',
  '注入系',
  'スレッド（糸リフト）',
  '美肌治療',
  '美容整形・外科', '美容外科（脱脂・埋没）',
  'ピーリング',
  '医療ボディ（痩身）', '医療ボディ痩身',
  '医療脱毛',
  '点滴・注射',
  '内服・外用薬',
  'フェイシャル',
  'リラクゼーション',
  'ボディ',
  'エステその他', 'エステブライダル', 'エステマタニティ',
  'オプション',
];

async function loadData() {
  try {
    const res = await fetch(DATA_URL);
    allData = await res.json();
    document.getElementById('updateTime').textContent =
      '最終更新: ' + new Date(allData.metadata.generated_at).toLocaleString('ja-JP', {
        year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    buildTabs();
    render();
  } catch (e) {
    document.getElementById('loadingMsg').textContent = 'データの読み込みに失敗しました。';
    console.error(e);
  }
}

function buildTabs() {
  const tabs = document.getElementById('categoryTabs');
  const categories = [...new Set(allData.treatments.map(t => t.category))]
    .sort((a, b) => {
      const ai = CATEGORY_ORDER.indexOf(a);
      const bi = CATEGORY_ORDER.indexOf(b);
      if (ai === -1 && bi === -1) return a.localeCompare(b, 'ja');
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      currentCategory = cat;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
    tabs.appendChild(btn);
  });

  document.querySelector('[data-cat="all"]').addEventListener('click', () => {
    currentCategory = 'all';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
    render();
  });
}

function fmt(val) {
  if (!val) return null;
  const n = parseInt(String(val).replace(/[¥,\s]/g, ''), 10);
  if (isNaN(n)) return null;
  return '¥' + n.toLocaleString('ja-JP');
}

function na() { return '<span class="p-na">—</span>'; }

function priceCell(val, cls) {
  const f = fmt(val);
  return f ? `<span class="${cls}">${f}</span>` : na();
}


function render() {
  const main = document.getElementById('mainContent');
  let treatments = allData.treatments;

  if (currentCategory !== 'all') {
    treatments = treatments.filter(t => t.category === currentCategory);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    treatments = treatments.filter(t =>
      (t.treatment || '').toLowerCase().includes(q) ||
      (t.area || '').toLowerCase().includes(q) ||
      (t.category || '').toLowerCase().includes(q)
    );
  }

  if (treatments.length === 0) {
    main.innerHTML = '<div class="no-results">該当する施術が見つかりませんでした。</div>';
    return;
  }

  // カテゴリごとにグループ
  const byCat = {};
  treatments.forEach(t => {
    const cat = t.category || '未分類';
    if (!byCat[cat]) byCat[cat] = [];
    byCat[cat].push(t);
  });

  const sortedCats = Object.keys(byCat).sort((a, b) => {
    const ai = CATEGORY_ORDER.indexOf(a);
    const bi = CATEGORY_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return a.localeCompare(b, 'ja');
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });

  let html = '';

  // プリペイド情報バー
  if (currentCategory === 'all' && !searchQuery) {
    html += `<div class="prepaid-info">
      <strong>プリペイド割引について</strong><br>
      PP10万（税込11万）/ PP30万（税込33万）/ PP50万（税込55万）の列は、各プリペイドティアでの割引適用後の価格です。<br>
      ※10万プリペイドは対象施術限定。詳しくはスタッフにお問い合わせください。
    </div>`;
  }

  sortedCats.forEach(cat => {
    const items = byCat[cat];

    // カテゴリ内で施術名+部位でグルーピング
    const groups = [];
    let lastKey = '';
    items.forEach(t => {
      const key = (t.treatment || '') + '||' + (t.area || '');
      if (key !== lastKey) {
        groups.push([]);
        lastKey = key;
      }
      groups[groups.length - 1].push(t);
    });

    html += `<div class="cat-section">`;
    html += `<div class="cat-header">${esc(cat)}</div>`;
    html += `<div class="table-wrap"><table class="price-table">`;

    // ヘッダー
    html += `<thead><tr>`;
    html += `<th>施術</th>`;
    html += `<th class="col-sessions">回数</th>`;
    html += `<th>通常価格</th>`;
    html += `<th>リピート割</th>`;
    html += `<th>CP</th>`;
    html += `<th>モニター<br>全顔出し</th>`;
    html += `<th>モニター<br>目元のみ</th>`;
    html += `<th class="th-pp">PP<br>10万</th>`;
    html += `<th class="th-pp">PP<br>30万</th>`;
    html += `<th class="th-pp">PP<br>50万</th>`;
    html += `</tr></thead>`;

    // ボディ
    html += `<tbody>`;
    groups.forEach(group => {
      group.forEach((t, idx) => {
        const isFirst = idx === 0;
        const rowClass = isFirst ? ' class="group-first"' : '';

        html += `<tr${rowClass}>`;

        // 施術名セル
        let nameHtml = '';
        if (isFirst && t.treatment) {
          nameHtml += `<span class="treat-name">${esc(t.treatment)}</span><br>`;
        }
        if (t.area) nameHtml += `<span class="treat-area">${esc(t.area)}</span>`;
        if (!nameHtml) nameHtml = `<span class="treat-area">${esc(t.treatment || '—')}</span>`;
        html += `<td>${nameHtml}</td>`;

        // 回数
        html += `<td class="col-sessions">${t.sessions ? esc(t.sessions) : na()}</td>`;

        // 通常価格
        html += `<td>${priceCell(t.price, 'p-val')}</td>`;

        // リピート割
        html += `<td>${priceCell(t.repeat_price, 'p-repeat')}</td>`;

        // CP
        html += `<td>${priceCell(t.campaign_price, 'p-campaign')}</td>`;

        // モニター
        html += `<td>${priceCell(t.monitor_full_price, 'p-monitor')}</td>`;
        html += `<td>${priceCell(t.monitor_eye_price, 'p-monitor')}</td>`;

        // PP列
        html += `<td class="td-pp">${priceCell(t.prepaid_10, 'p-pp')}</td>`;
        html += `<td class="td-pp">${priceCell(t.prepaid_30, 'p-pp')}</td>`;
        html += `<td class="td-pp">${priceCell(t.prepaid_50, 'p-pp')}</td>`;

        html += `</tr>`;
      });
    });
    html += `</tbody></table></div></div>`;
  });

  main.innerHTML = html;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// 検索
let searchTimer;
document.getElementById('searchBox').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    render();
  }, 200);
});

loadData();
</script>

</body>
</html>
