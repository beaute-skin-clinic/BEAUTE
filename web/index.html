<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ボーテスキンクリニック 料金表</title>
  <style>
    :root {
      --primary: #b07d62;
      --primary-light: #d4a98a;
      --primary-dark: #8a5c3f;
      --accent: #e8d5c4;
      --bg: #faf7f4;
      --card-bg: #fff;
      --text: #3a2e27;
      --text-light: #7a6a5f;
      --border: #e0d0c4;
      --highlight: #fff3ec;
      --old-price: #aaa;
      --first-visit: #2563eb;
      --campaign: #dc2626;
      --bundle: #047857;
      --repeat: #7c3aed;
      --monitor: #0891b2;
      --pp-bg: #fef9ef;
      --pp-border: #e8c97a;
      --pp-text: #92400e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ===== ヘッダー ===== */
    .site-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      color: #fff;
      padding: 16px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .site-header h1 { font-size: 18px; font-weight: bold; letter-spacing: 0.05em; }
    .site-header .subtitle { font-size: 11px; opacity: 0.85; margin-top: 2px; }
    .update-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }

    /* ===== 検索・フィルター ===== */
    .controls {
      background: #fff;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 60px;
      z-index: 99;
    }
    .search-box {
      width: 100%;
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      outline: none;
      background: var(--bg);
      color: var(--text);
    }
    .search-box:focus { border-color: var(--primary); }

    /* ===== 区分フィルター ===== */
    .type-filter {
      display: flex;
      gap: 0;
      padding: 6px 14px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .type-btn {
      padding: 5px 16px;
      border: 1.5px solid var(--border);
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: var(--text-light);
      transition: all 0.15s;
      font-family: inherit;
      font-weight: 500;
    }
    .type-btn:first-child { border-radius: 8px 0 0 8px; }
    .type-btn:last-child { border-radius: 0 8px 8px 0; }
    .type-btn:not(:first-child) { border-left: none; }
    .type-btn.active {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      color: #fff;
    }
    .type-btn:not(.active):hover {
      background: var(--accent);
      color: var(--primary-dark);
    }

    /* ===== カテゴリタブ ===== */
    .category-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 6px 14px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 4px 10px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 11px;
      cursor: pointer;
      background: #fff;
      color: var(--text-light);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ===== メインコンテンツ ===== */
    .main {
      padding: 10px;
      overflow: auto;
      height: calc(100vh - 176px);
      -webkit-overflow-scrolling: touch;
    }

    /* ===== カテゴリブロック ===== */
    .cat-section { margin-bottom: 16px; }
    .cat-header {
      background: var(--primary);
      color: #fff;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 8px 8px 0 0;
      letter-spacing: 0.03em;
      position: sticky;
      top: 0;
      z-index: 3;
    }

    /* ===== テーブル ===== */
    .table-wrap {
      border-radius: 0 0 8px 8px;
      box-shadow: 0 2px 8px rgba(176,125,98,0.1);
    }

    .price-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-size: 12px;
    }

    .price-table thead th {
      background: var(--primary-dark);
      color: #fff;
      padding: 6px 8px;
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,0.15);
      position: sticky;
      top: 34px;
      z-index: 2;
    }
    .price-table thead th:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
    }
    .price-table thead th:nth-child(2) {
      text-align: left;
      padding-left: 10px;
      position: sticky;
      left: 80px;
      z-index: 3;
      min-width: 120px;
      max-width: 180px;
    }
    .price-table thead th:last-child { border-right: none; }

    /* PP列ヘッダー */
    .price-table thead th.th-pp {
      background: #78350f;
    }

    .price-table tbody td {
      padding: 5px 8px;
      border-bottom: 1px solid #f0e8e0;
      border-right: 1px solid #f5efe8;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }
    .price-table tbody td:first-child {
      position: sticky;
      left: 0;
      background: inherit;
      z-index: 1;
    }
    .price-table tbody td:nth-child(2) {
      text-align: left;
      padding-left: 10px;
      position: sticky;
      left: 80px;
      background: inherit;
      z-index: 1;
      white-space: normal;
      min-width: 120px;
      max-width: 180px;
      word-break: break-all;
    }
    .price-table tbody td:last-child { border-right: none; }

    .price-table tbody tr:nth-child(even) { background: #faf7f4; }
    .price-table tbody tr:nth-child(even) td:first-child,
    .price-table tbody tr:nth-child(even) td:nth-child(2) { background: #faf7f4; }
    .price-table tbody tr:nth-child(odd) td:first-child,
    .price-table tbody tr:nth-child(odd) td:nth-child(2) { background: #fff; }
    .price-table tbody tr:hover { background: #fdf2e9 !important; }
    .price-table tbody tr:hover td:first-child,
    .price-table tbody tr:hover td:nth-child(2) { background: #fdf2e9 !important; }

    /* 施術名セル */
    .treat-name { font-weight: 600; font-size: 12px; color: var(--primary-dark); }
    .treat-area { font-size: 11px; color: var(--text-light); }
    .treat-sessions {
      display: inline-block;
      background: var(--accent);
      color: var(--primary-dark);
      border-radius: 8px;
      padding: 0 5px;
      font-size: 10px;
      margin-left: 4px;
    }

    /* グループ区切り */
    .group-first td { border-top: 2px solid var(--border); }

    /* 価格セル */
    .p-val { font-weight: 700; color: var(--text); }
    .p-old {
      color: var(--old-price);
      font-size: 11px;
    }
    .p-first { color: var(--first-visit); font-weight: 600; }
    .p-repeat { color: var(--repeat); font-weight: 600; }
    .p-campaign { color: var(--campaign); font-weight: 700; }
    .p-monitor { color: var(--monitor); font-weight: 600; }
    .p-na { color: #ccc; font-size: 11px; }
    .price-none { font-size: 10px; color: #aaa; font-style: italic; }
    .price-badges { display: inline-flex; gap: 4px; flex-wrap: wrap; }
    .price-up { font-size: 9px; color: #d9534f; font-weight: bold; white-space: nowrap; }
    .price-down { font-size: 9px; color: #28a745; font-weight: bold; white-space: nowrap; }
    .price-warn { font-size: 9px; color: #e67e22; font-weight: bold; white-space: nowrap; }
    .price-warn-high { font-size: 9px; color: #d9534f; font-weight: bold; white-space: nowrap; }

    /* PP列 */
    .td-pp {
      background: var(--pp-bg) !important;
    }
    .p-pp { color: var(--pp-text); font-weight: 600; font-size: 11px; }
    .pp-rate { font-size: 8px; color: #cbb690; white-space: nowrap; letter-spacing: -0.5px; }
    .pp-excluded { font-size: 9px; color: #c5b79e; white-space: nowrap; }
    .price-table tbody tr:nth-child(even) .td-pp { background: #fdf6e8 !important; }
    .price-table tbody tr:hover .td-pp { background: #fef0d4 !important; }

    /* 回数券列 */
    .price-table thead th.th-ticket { background: #064e3b; }
    .td-ticket { background: #f0faf5 !important; }
    .price-table tbody tr:nth-child(even) .td-ticket { background: #e6f5ed !important; }
    .price-table tbody tr:hover .td-ticket { background: #d1fae5 !important; }
    .p-ticket { color: #065f46; font-weight: 600; font-size: 11px; }
    .ticket-unit { font-size: 8px; color: #6ee7b7; white-space: nowrap; letter-spacing: -0.5px; }
    .ticket-same { font-size: 8px; color: #e67e22; font-weight: 600; white-space: nowrap; }
    .ticket-off { font-size: 8px; color: #059669; font-weight: 600; white-space: nowrap; }
    .ticket-warn { font-size: 8px; color: #d9534f; font-weight: 600; white-space: nowrap; }
    .ticket-badge { display: inline-block; background: #d1fae5; color: #065f46; border-radius: 8px; padding: 0 5px; font-size: 9px; margin-left: 4px; font-weight: 600; vertical-align: middle; }

    /* エステパス列 */
    .price-table thead th.th-ep { background: #7c2d8e; }
    .td-ep { background: #fdf4ff !important; }
    .price-table tbody tr:nth-child(even) .td-ep { background: #f5e6fa !important; }
    .price-table tbody tr:hover .td-ep { background: #ede0f3 !important; }
    .p-ep { color: #6b21a8; font-weight: 600; font-size: 11px; }
    .ep-rate { font-size: 8px; color: #c084fc; white-space: nowrap; letter-spacing: -0.5px; }
    .ep-excluded { font-size: 9px; color: #d8b4fe; white-space: nowrap; }

    /* 区分列 */
    .price-table thead th.col-type,
    .price-table tbody td.col-type {
      text-align: center;
      white-space: nowrap;
      font-size: 10px;
      color: var(--text-light);
      width: 80px;
      min-width: 80px;
      max-width: 80px;
    }

    /* 単位列 */
    .price-table thead th.col-sessions,
    .price-table tbody td.col-sessions {
      text-align: center;
      white-space: nowrap;
      font-size: 11px;
    }

    /* ===== 旧価格列（開閉式）===== */
    .col-old { display: none; }
    body.show-old-price .col-old { display: table-cell; }
    .col-old-note { display: block; font-size: 8px; opacity: 0.75; font-weight: 400; }

    /* トグルボタン */
    .old-price-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      margin-left: 8px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 11px;
      cursor: pointer;
      background: #fff;
      color: var(--text-light);
      transition: all 0.15s;
      font-family: inherit;
      vertical-align: middle;
    }
    .old-price-toggle:hover { border-color: var(--primary); color: var(--primary); }
    body.show-old-price .old-price-toggle {
      background: var(--old-price);
      border-color: var(--old-price);
      color: #fff;
    }
    .toggle-arrow { font-size: 10px; transition: transform 0.2s; }
    body.show-old-price .toggle-arrow { transform: rotate(90deg); }

    /* ===== プリペイド説明 ===== */
    .prepaid-info {
      background: var(--pp-bg);
      border: 1px solid var(--pp-border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      font-size: 11px;
      color: var(--pp-text);
      line-height: 1.6;
    }
    .prepaid-info strong { font-weight: 700; }

    /* ===== 検索なし ===== */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    /* ===== フッター ===== */
    .site-footer {
      background: var(--primary-dark);
      color: rgba(255,255,255,0.85);
      padding: 14px;
      text-align: center;
      font-size: 11px;
    }
    .footer-note { color: rgba(255,255,255,0.6); margin-top: 4px; font-size: 10px; }

    /* ===== スマホ非対応メッセージ ===== */
    .mobile-block {
      display: none;
      text-align: center;
      padding: 60px 24px;
      color: var(--text-light);
      line-height: 1.8;
    }
    .mobile-block-icon { font-size: 36px; margin-bottom: 12px; }
    .mobile-block-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .mobile-block-msg { font-size: 13px; }

    @media (max-width: 767px) {
      .mobile-block { display: block; }
      .controls, .category-tabs, .main, .print-btn { display: none !important; }
    }

    /* ===== 印刷ボタン ===== */
    .print-btn {
      position: fixed;
      bottom: 16px;
      right: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(176,125,98,0.4);
      z-index: 200;
      font-family: inherit;
    }

    /* ===== 印刷 ===== */
    @media print {
      @page {
        size: A4 landscape;
        margin: 8mm 6mm;
      }

      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

      body { font-size: 9px; background: #fff; }

      /* 非表示要素 */
      .controls, .category-tabs, .type-filter,
      .print-btn, .mobile-block, .site-footer,
      .prepaid-info, .old-price-toggle,
      #oldPriceToggleWrap { display: none !important; }

      /* ヘッダー: 印刷用にコンパクト化 */
      .site-header {
        position: static;
        box-shadow: none;
        padding: 8px 12px;
        background: var(--primary-dark) !important;
        -webkit-print-color-adjust: exact !important;
      }
      .site-header h1 { font-size: 14px; }
      .site-header .subtitle { font-size: 10px; }
      .update-time { font-size: 9px; }

      /* メインコンテンツ: スクロール制約を解除 */
      .main {
        padding: 4px 0;
        height: auto !important;
        overflow: visible !important;
        max-width: none;
      }

      /* カテゴリセクション */
      .cat-section {
        margin-bottom: 6px;
        page-break-inside: auto;
        break-inside: auto;
      }
      .cat-header {
        position: static;
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 4px 4px 0 0;
        background: var(--primary) !important;
        -webkit-print-color-adjust: exact !important;
      }

      /* テーブル */
      .table-wrap {
        overflow: visible;
        box-shadow: none;
        border-radius: 0 0 4px 4px;
      }
      .price-table {
        min-width: auto;
        width: 100%;
        font-size: 8px;
        table-layout: auto;
        border: 1px solid #999;
      }
      .price-table thead th {
        font-size: 7px;
        padding: 3px 4px;
        position: static !important;
        border: 1px solid rgba(255,255,255,0.3);
        background: var(--primary-dark) !important;
        -webkit-print-color-adjust: exact !important;
      }
      .price-table thead th.th-pp {
        background: #78350f !important;
      }
      .price-table thead th.th-ticket {
        background: #064e3b !important;
      }
      .price-table thead th.th-ep {
        background: #7c2d8e !important;
      }
      .price-table tbody td {
        padding: 2px 3px;
        position: static !important;
        border: 1px solid #ddd;
        font-size: 8px;
      }
      .price-table tbody td:nth-child(2) {
        min-width: 80px;
        max-width: 140px;
      }
      .price-table tbody tr:nth-child(even) { background: #f9f9f9 !important; }
      .price-table tbody tr:hover { background: inherit !important; }

      /* PP/回数券/EP列の背景色を維持 */
      .td-pp { background: #fef9ef !important; }
      .td-ticket { background: #f0faf5 !important; }
      .td-ep { background: #fdf4ff !important; }
      .price-table tbody tr:nth-child(even) .td-pp { background: #fdf6e8 !important; }
      .price-table tbody tr:nth-child(even) .td-ticket { background: #e6f5ed !important; }
      .price-table tbody tr:nth-child(even) .td-ep { background: #f5e6fa !important; }

      /* グループ区切りを明確に */
      .group-first td { border-top: 2px solid #999 !important; }

      /* 印刷用フッター */
      .print-footer {
        display: block !important;
        text-align: center;
        font-size: 8px;
        color: #999;
        padding: 6px 0;
        margin-top: 8px;
        border-top: 1px solid #ddd;
      }
    }

    /* 画面上では印刷フッター非表示 */
    .print-footer { display: none; }

    /* ===== デスクトップ ===== */
    @media (min-width: 900px) {
      .site-header h1 { font-size: 22px; }
      .main { max-width: 1200px; margin: 0 auto; padding: 14px 20px; }
      .controls, .type-filter, .category-tabs { max-width: 1200px; margin: 0 auto; }
      .price-table { font-size: 13px; }
      .price-table thead th { font-size: 11px; padding: 8px; }
      .price-table tbody td { padding: 6px 10px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1>ボーテスキンクリニック</h1>
  <div class="subtitle">料金表 ※税込</div>
  <div class="update-time" id="updateTime"></div>
</header>

<div class="mobile-block">
  <div class="mobile-block-icon">💻</div>
  <div class="mobile-block-title">タブレット・PCでご覧ください</div>
  <div class="mobile-block-msg">料金表は画面サイズの関係上、<br>タブレットまたはPC（横幅768px以上）での<br>閲覧を推奨しております。</div>
</div>

<div class="controls">
  <input type="search" class="search-box" id="searchBox" placeholder="施術名・部位／詳細で検索..." autocomplete="off">
  <div id="oldPriceToggleWrap" style="display:none; margin-top:6px; text-align:right;">
    <button class="old-price-toggle" id="oldPriceToggle" type="button">
      <span class="toggle-arrow">▶</span> 旧価格を表示
    </button>
  </div>
</div>

<div class="type-filter" id="typeFilter">
  <button class="type-btn active" data-type="all">すべて</button>
  <button class="type-btn" data-type="医療（Dr.施術）">Dr.施術</button>
  <button class="type-btn" data-type="医療（Dr.オペ）">Dr.オペ</button>
  <button class="type-btn" data-type="医療（Ns施術）">Ns施術</button>
  <button class="type-btn" data-type="医療（その他）">その他</button>
  <button class="type-btn" data-type="エステ">エステ</button>
  <button class="type-btn" data-type="なし">なし</button>
</div>

<div class="category-tabs" id="categoryTabs">
  <button class="tab-btn active" data-cat="all">すべて</button>
</div>

<main class="main" id="mainContent">
  <div class="no-results" id="loadingMsg">読み込み中...</div>
</main>

<button class="print-btn" onclick="preparePrint()">🖨️ 印刷</button>

<div class="print-footer">
  ボーテスキンクリニック 料金表 ※税込 ― 印刷日: <span id="printDate"></span> ― ※価格は予告なく変更する場合がございます。
</div>

<footer class="site-footer">
  <div>ボーテスキンクリニック</div>
  <div class="footer-note">※表示価格はすべて税込です。価格は予告なく変更する場合がございます。</div>
</footer>

<script>
const DATA_URL = './data/prices_public.json';

let allData = null;
let currentCategory = 'all';
let currentType = 'all';
let searchQuery = '';

const CATEGORY_ORDER = [
  '肌質改善／肌育',
  'ヒアルロン酸',
  'ボトックス',
  '毛穴・ニキビ・肌の凹凸ケア',
  'しわ・たるみ・小顔',
  '美肌・肌質改善（シミ・くすみ・透明感）',
  'ピーリング',
  'スレッド（糸リフト）',
  '目元のクマたるみ治療（オペ）',
  '目元の形成（オペ）',
  '医療痩身',
  '医療脱毛',
  '点滴・注射',
  '麻酔',
  '診察料',
  'エステフェイシャル',
  'リラクゼーション',
  'エステボディ',
  'エステブライダル', 'エステマタニティ',
];

// PP割引率テーブル
const PREPAID_RATES = {
  "医療（Ns施術）": {"10万": 10, "30万": 20, "50万": 25},
  "医療（Dr.施術）": {"10万": 0,  "30万": 10, "50万": 10},
  "医療（Dr.オペ）": {"10万": 0,  "30万": 0,  "50万": 10},
  "エステ":          {"10万": 10, "30万": 20, "50万": 20},
  "医療（その他）":   {"10万": 0,  "30万": 0,  "50万": 0},
};
const PP10_KEYWORDS = [
  "フォトナ", "ピコトーニング", "ピコフラクショナル", "フォトフェイシャル",
  "イオン導入", "ピーリング", "ダーマペン", "ヴェルヴェットスキン", "ハイドラフェイシャル",
];
const PP_REDUCED_RATE_TREATMENTS = [
  { keywords: ['ヒアルロン酸'], provider: '医療（Dr.施術）', rate: 5 },
  { keywords: ['サーマニードルアイ'], provider: '医療（Dr.施術）', rate: 5 },
];
const PP_EXCLUDED_30_50 = ['ボトックス', 'ヒアルローニターゼ', 'ヒアルロニダーゼ'];

// 施術ごとのPP実効割引率を取得（表示用）
function getEffectivePpRate(t, tier) {
  const ptype = t.provider_type;
  if (!ptype) return 0;
  const rates = PREPAID_RATES[ptype];
  if (!rates) return 0;
  const baseRate = rates[tier] || 0;
  if (baseRate === 0) return 0;
  if (tier === '10万') {
    const catStr = (t.categories || [t.category] || []).filter(Boolean).join(' ');
    const isEligible = PP10_KEYWORDS.some(kw =>
      (t.treatment || '').includes(kw) || catStr.includes(kw)
    );
    return isEligible ? baseRate : 0;
  }
  const tName = t.treatment || '';
  if (PP_EXCLUDED_30_50.some(kw => tName.includes(kw))) return 0;
  for (const rule of PP_REDUCED_RATE_TREATMENTS) {
    if (ptype === rule.provider && rule.keywords.some(kw => tName.includes(kw))) {
      return rule.rate;
    }
  }
  return baseRate;
}

// PP対象外判定
function getPpStatus(t, tier) {
  const price = parseInt(String(t.price || '').replace(/[¥,\s]/g, ''), 10);
  const ptype = t.provider_type;
  if (!ptype || isNaN(price) || price === 0) return '';
  const rates = PREPAID_RATES[ptype];
  if (!rates) return '';
  const rate = rates[tier] || 0;
  if (rate === 0) return '対象外';
  if (tier === '10万') {
    const catStr = (t.categories || [t.category] || []).filter(Boolean).join(' ');
    const isEligible = PP10_KEYWORDS.some(kw =>
      (t.treatment || '').includes(kw) || catStr.includes(kw)
    );
    if (!isEligible) return '対象外';
  }
  if (tier === '30万' || tier === '50万') {
    const tName = t.treatment || '';
    if (PP_EXCLUDED_30_50.some(kw => tName.includes(kw))) return '対象外';
  }
  return '';
}

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?_=' + Date.now());
    allData = await res.json();
    const genAt = new Date(allData.metadata.generated_at);
    document.getElementById('updateTime').textContent =
      '最終更新: ' + genAt.toLocaleString('ja-JP', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    buildTabs();
    render();
  } catch (e) {
    document.getElementById('loadingMsg').textContent = 'データの読み込みに失敗しました。';
    console.error(e);
  }
}

function buildTabs() {
  rebuildCategoryTabs();

  // 区分フィルターのクリック
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentType = btn.dataset.type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCategory = 'all';
      rebuildCategoryTabs();
      render();
    });
  });
}

function rebuildCategoryTabs() {
  const tabs = document.getElementById('categoryTabs');
  tabs.innerHTML = '';

  // 区分でフィルターした施術のカテゴリのみ表示
  let filtered = allData.treatments;
  if (currentType !== 'all') {
    filtered = currentType === 'なし'
      ? filtered.filter(t => !t.provider_type)
      : filtered.filter(t => t.provider_type === currentType);
  }

  const categories = [...new Set(filtered.flatMap(t => t.categories || [t.category]))]
    .sort((a, b) => {
      const ai = CATEGORY_ORDER.indexOf(a);
      const bi = CATEGORY_ORDER.indexOf(b);
      if (ai === -1 && bi === -1) return a.localeCompare(b, 'ja');
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });

  // 「すべて」ボタン
  const allBtn = document.createElement('button');
  allBtn.className = 'tab-btn active';
  allBtn.dataset.cat = 'all';
  allBtn.textContent = 'すべて';
  allBtn.addEventListener('click', () => {
    currentCategory = 'all';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    render();
  });
  tabs.appendChild(allBtn);

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    if (cat === currentCategory) {
      btn.classList.add('active');
      allBtn.classList.remove('active');
    }
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      currentCategory = cat;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
    tabs.appendChild(btn);
  });
}

function fmt(val) {
  if (!val) return null;
  const n = parseInt(String(val).replace(/[¥,\s]/g, ''), 10);
  if (isNaN(n)) return null;
  return '¥' + n.toLocaleString('ja-JP');
}

function na() { return '<span class="p-na">—</span>'; }

function priceCell(val, cls) {
  const f = fmt(val);
  return f ? `<span class="${cls}">${f}</span>` : na();
}

// 旧価格との比較インジケーター（旧通常・旧初回の2つを横並び）
function priceCompareAll(newPrice, oldPrice, oldFirstPrice) {
  const np = newPrice ? parseInt(String(newPrice).replace(/[¥,\s]/g, ''), 10) : NaN;
  if (isNaN(np)) return '';
  function badge(label, oldVal) {
    if (!oldVal) return '';
    const ov = parseInt(String(oldVal).replace(/[¥,\s]/g, ''), 10);
    if (isNaN(ov) || np === ov) return '';
    if (np > ov) return `<span class="price-up">旧${label}↑</span>`;
    return `<span class="price-down">旧${label}↓</span>`;
  }
  const b1 = badge('通常', oldPrice);
  const b2 = badge('初回', oldFirstPrice);
  if (!b1 && !b2) return '';
  return '<br><span class="price-badges">' + [b1, b2].filter(Boolean).join(' ') + '</span>';
}

// 割引価格が通常価格以上かチェック
function discountWarn(discountVal, basePrice) {
  if (!discountVal || discountVal === '設定なし' || discountVal === 'なし') return '';
  if (!basePrice) return '';
  const dv = parseInt(String(discountVal).replace(/[¥,\s]/g, ''), 10);
  const bp = parseInt(String(basePrice).replace(/[¥,\s]/g, ''), 10);
  if (isNaN(dv) || isNaN(bp)) return '';
  if (dv > bp) return '<br><span class="price-warn-high">⚠割高</span>';
  if (dv === bp) return '<br><span class="price-warn">⚠同額</span>';
  return '';
}

// first_priceまたはold_priceがあるか判定
function hasOldPrices(treatments) {
  return treatments.some(t => t.first_price || t.old_price);
}


function render() {
  const main = document.getElementById('mainContent');
  let treatments = allData.treatments;

  // 区分フィルター
  if (currentType !== 'all') {
    treatments = currentType === 'なし'
      ? treatments.filter(t => !t.provider_type)
      : treatments.filter(t => t.provider_type === currentType);
  }
  if (currentCategory !== 'all') {
    treatments = treatments.filter(t => (t.categories || [t.category]).includes(currentCategory));
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    treatments = treatments.filter(t =>
      (t.treatment || '').toLowerCase().includes(q) ||
      (t.area || '').toLowerCase().includes(q) ||
      (t.categories || [t.category]).some(c => (c || '').toLowerCase().includes(q))
    );
  }

  if (treatments.length === 0) {
    main.innerHTML = '<div class="no-results">該当する施術が見つかりませんでした。</div>';
    return;
  }

  // カテゴリごとにグループ（複数カテゴリの施術は各セクションに表示）
  const byCat = {};
  treatments.forEach(t => {
    const cats = (t.categories && t.categories.length > 0) ? t.categories : [t.category || '未分類'];
    cats.forEach(cat => {
      if (!byCat[cat]) byCat[cat] = [];
      byCat[cat].push(t);
    });
  });

  const sortedCats = Object.keys(byCat).sort((a, b) => {
    const ai = CATEGORY_ORDER.indexOf(a);
    const bi = CATEGORY_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return a.localeCompare(b, 'ja');
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });

  // first_priceがある = 価格改定あり → 旧価格トグルを表示
  const hasNewPrice = hasOldPrices(treatments);
  const toggleWrap = document.getElementById('oldPriceToggleWrap');
  if (toggleWrap) toggleWrap.style.display = hasNewPrice ? '' : 'none';

  let html = '';

  // プリペイド情報バー
  if (currentCategory === 'all' && !searchQuery) {
    html += `<div class="prepaid-info">
      <strong>プリペイド割引について</strong><br>
      PP10万（税込11万）/ PP30万（税込33万）/ PP50万（税込55万）の列は、各プリペイドティアでの割引適用後の価格です。<br>
      ※10万プリペイドは対象施術限定。詳しくはスタッフにお問い合わせください。
    </div>`;
  }

  sortedCats.forEach(cat => {
    const items = byCat[cat];

    // カテゴリ内で施術名+部位でグルーピング
    const groups = [];
    let lastKey = '';
    items.forEach(t => {
      const key = (t.treatment || '') + '||' + (t.area || '');
      if (key !== lastKey) {
        groups.push([]);
        lastKey = key;
      }
      groups[groups.length - 1].push(t);
    });

    const ESTE_CATS = ['エステフェイシャル', 'リラクゼーション', 'エステボディ', 'エステブライダル', 'エステマタニティ'];
    const isEsteCat = ESTE_CATS.includes(cat);

    // このカテゴリに回数券データがあるか判定
    const hasTicket = items.some(t => t.ticket_3 || t.ticket_5 || t.ticket_8);

    html += `<div class="cat-section">`;
    html += `<div class="cat-header">${esc(cat)}</div>`;
    html += `<div class="table-wrap"><table class="price-table">`;

    // ヘッダー
    html += `<thead><tr>`;
    html += `<th class="col-type">区分</th>`;
    html += `<th>施術<br><span style="font-size:9px;font-weight:normal;opacity:0.7;">（部位／詳細）</span></th>`;
    html += `<th class="col-sessions">単位</th>`;
    if (hasNewPrice) {
      html += `<th class="col-old">旧通常価格<span class="col-old-note">※改定前</span></th>`;
      html += `<th class="col-old">旧初回価格<span class="col-old-note">※改定前</span></th>`;
    }
    html += `<th>通常価格<span class="col-old-note">※2026年4月〜</span></th>`;
    html += `<th>リピート割</th>`;
    html += `<th>CP</th>`;
    html += `<th>モニター<br>全顔出し</th>`;
    html += `<th>モニター<br>目元のみ</th>`;
    if (hasTicket) {
      html += `<th class="th-ticket">3回券</th>`;
      html += `<th class="th-ticket">5回券</th>`;
      html += `<th class="th-ticket">8回券</th>`;
    }
    html += `<th class="th-pp">PP<br>10万</th>`;
    html += `<th class="th-pp">PP<br>30万</th>`;
    html += `<th class="th-pp">PP<br>50万</th>`;
    if (isEsteCat) {
      html += `<th class="th-ep">EP<br>5万</th>`;
      html += `<th class="th-ep">EP<br>10万</th>`;
      html += `<th class="th-ep">EP<br>20万</th>`;
    }
    html += `</tr></thead>`;

    // ボディ
    html += `<tbody>`;
    groups.forEach(group => {
      group.forEach((t, idx) => {
        const isFirst = idx === 0;
        const rowClass = isFirst ? ' class="group-first"' : '';

        html += `<tr${rowClass}>`;

        // 施術名セル
        let nameHtml = '';
        if (isFirst && t.treatment) {
          nameHtml += `<span class="treat-name">${esc(t.treatment)}</span><br>`;
        }
        if (t.area) nameHtml += `<span class="treat-area">${esc(t.area)}</span>`;
        if (!nameHtml) nameHtml = `<span class="treat-area">${esc(t.treatment || '—')}</span>`;
        // 回数券バッジ
        if (t.ticket_3 || t.ticket_5 || t.ticket_8) {
          nameHtml += `<span class="ticket-badge">回数券</span>`;
        }

        // 区分
        html += `<td class="col-type">${esc(t.provider_type || '')}</td>`;

        // 施術名セル
        html += `<td>${nameHtml}</td>`;

        // 単位（データソースでクリーニング済み）
        html += `<td class="col-sessions">${t.sessions ? esc(t.sessions) : na()}</td>`;

        // 旧通常価格・旧初回価格・通常価格
        if (hasNewPrice) {
          html += `<td class="col-old">${t.old_price ? `<span class="p-old">${fmt(t.old_price)}</span>` : na()}</td>`;
          html += `<td class="col-old">${(t.first_price === '設定なし' || t.first_price === 'なし') ? '<span class="price-none">設定なし</span>' : (t.first_price ? `<span class="p-old">${fmt(t.first_price)}</span>` : na())}</td>`;
        }
        html += `<td>${priceCell(t.price, 'p-val')}${priceCompareAll(t.price, t.old_price, t.first_price)}</td>`;

        // リピート割
        html += `<td>${(t.repeat_price === '設定なし' || t.repeat_price === 'なし') ? '<span class="price-none">設定なし</span>' : priceCell(t.repeat_price, 'p-repeat')}</td>`;

        // CP
        html += `<td>${(t.campaign_price === '設定なし' || t.campaign_price === 'なし') ? '<span class="price-none">設定なし</span>' : priceCell(t.campaign_price, 'p-campaign')}${discountWarn(t.campaign_price, t.price)}</td>`;

        // モニター
        html += `<td>${(t.monitor_full_price === '設定なし' || t.monitor_full_price === 'なし') ? '<span class="price-none">設定なし</span>' : priceCell(t.monitor_full_price, 'p-monitor')}${discountWarn(t.monitor_full_price, t.price)}</td>`;
        html += `<td>${(t.monitor_eye_price === '設定なし' || t.monitor_eye_price === 'なし') ? '<span class="price-none">設定なし</span>' : priceCell(t.monitor_eye_price, 'p-monitor')}${discountWarn(t.monitor_eye_price, t.price)}</td>`;

        // 回数券列
        function ticketCell(val, count) {
          if (!val) return '<span class="price-none">設定なし</span>';
          const f = fmt(val);
          if (!f) return '<span class="price-none">設定なし</span>';
          const base = parseInt(String(t.price || '').replace(/[¥,\s]/g, ''), 10);
          const unit = Math.round(Number(val) / count);
          let badge = '';
          if (!isNaN(base) && base > 0) {
            if (unit < base) {
              const pct = Math.round((base - unit) / base * 100);
              badge = `<span class="ticket-unit">@${fmt(String(unit))}</span> <span class="ticket-off">${pct}%OFF</span>`;
            } else if (unit === base) {
              badge = `<span class="ticket-same">@${fmt(String(unit))}（同額）</span>`;
            } else {
              badge = `<span class="ticket-warn">@${fmt(String(unit))}（⚠割高）</span>`;
            }
          }
          return `<span class="p-ticket">${f}</span>${badge ? '<br>' + badge : ''}`;
        }
        if (hasTicket) {
          html += `<td class="td-ticket">${ticketCell(t.ticket_3, 3)}</td>`;
          html += `<td class="td-ticket">${ticketCell(t.ticket_5, 5)}</td>`;
          html += `<td class="td-ticket">${ticketCell(t.ticket_8, 8)}</td>`;
        }

        // PP列
        const ppS10 = getPpStatus(t, '10万');
        const ppS30 = getPpStatus(t, '30万');
        const ppS50 = getPpStatus(t, '50万');
        const ppR10 = t.prepaid_10 && ppS10 !== '対象外' ? getEffectivePpRate(t, '10万') : 0;
        const ppR30 = t.prepaid_30 && ppS30 !== '対象外' ? getEffectivePpRate(t, '30万') : 0;
        const ppR50 = t.prepaid_50 && ppS50 !== '対象外' ? getEffectivePpRate(t, '50万') : 0;
        function ppCell(status, val, rate) {
          if (status === '対象外') return `<span class="pp-excluded">対象外</span>`;
          return priceCell(val, 'p-pp') + (rate > 0 ? `<br><span class="pp-rate">${rate}%OFF</span>` : '');
        }
        html += `<td class="td-pp">${ppCell(ppS10, t.prepaid_10, ppR10)}</td>`;
        html += `<td class="td-pp">${ppCell(ppS30, t.prepaid_30, ppR30)}</td>`;
        html += `<td class="td-pp">${ppCell(ppS50, t.prepaid_50, ppR50)}</td>`;

        // エステパス列（エステカテゴリのみ）
        if (isEsteCat) {
          function epCell(val, rate) {
            if (!val) return `<span class="ep-excluded">対象外</span>`;
            return `<span class="p-ep">${fmt(val)}</span><br><span class="ep-rate">${rate}%OFF</span>`;
          }
          html += `<td class="td-ep">${epCell(t.estepass_5, 5)}</td>`;
          html += `<td class="td-ep">${epCell(t.estepass_10, 10)}</td>`;
          html += `<td class="td-ep">${epCell(t.estepass_20, 20)}</td>`;
        }

        html += `</tr>`;
      });
    });
    html += `</tbody></table></div></div>`;
  });

  main.innerHTML = html;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// 検索
let searchTimer;
document.getElementById('searchBox').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    render();
  }, 200);
});

// 旧価格列トグル
document.getElementById('oldPriceToggle').addEventListener('click', () => {
  document.body.classList.toggle('show-old-price');
  const btn = document.getElementById('oldPriceToggle');
  const isOpen = document.body.classList.contains('show-old-price');
  btn.innerHTML = isOpen
    ? '<span class="toggle-arrow">▶</span> 旧価格を非表示'
    : '<span class="toggle-arrow">▶</span> 旧価格を表示';
});

// 印刷準備
function preparePrint() {
  const el = document.getElementById('printDate');
  if (el) {
    el.textContent = new Date().toLocaleDateString('ja-JP', {
      year: 'numeric', month: 'long', day: 'numeric'
    });
  }
  window.print();
}

loadData();
</script>
